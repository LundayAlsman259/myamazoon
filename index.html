<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>確認ページ</title>
<style>
body{
  margin:0;
  background:#f8f9f9;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  color:#222;
}
.wrap{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  box-sizing:border-box;
}
.card{
  width:100%;
  max-width:420px;
  background:#fff;
  border-radius:16px;
  padding:32px 26px;
  text-align:center;
  box-shadow:0 4px 18px rgba(0,0,0,.08);
}
h2{
  margin:0 0 14px;
  font-size:20px;
  font-weight:500;
}
p{
  margin:0 0 22px;
  font-size:14px;
  line-height:1.7;
  color:#555;
}
.btn{
  display:inline-block;
  background:#24569c;
  color:#fff;
  text-decoration:none;
  padding:14px 28px;
  border-radius:10px;
  font-size:15px;
}
.note{
  margin-top:16px;
  font-size:12px;
  color:#888;
}
</style>
</head>
<body>

<div class="wrap">
  <div class="card">
    <h2>確認ページ</h2>
    <p>続きの内容は、下のボタンからご確認いただけます。</p>

    <a class="btn" href="https://woepooe.mobi/futurescoutre" rel="noopener noreferrer">
      続行する
    </a>

    <div class="note">
      ※ 自動転送は行われません。
    </div>
  </div>
</div>

</body>
</html>
