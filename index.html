<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>確認ページ</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  background:#eaeded;
  font-family:Arial,"Helvetica Neue",sans-serif;
  color:#111;
}

.header{
  height:58px;
  background:#131921;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:20px;
  font-weight:700;
  letter-spacing:.3px;
}

.header span{
  color:#ff9900;
}

.wrap{
  min-height:calc(100vh - 58px);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px 16px;
}

.card{
  width:100%;
  max-width:430px;
  background:#fff;
  border-radius:8px;
  padding:30px 26px;
  box-shadow:0 2px 10px rgba(0,0,0,.12);
}

h1{
  margin:0 0 14px;
  font-size:22px;
  font-weight:500;
  line-height:1.35;
}

p{
  margin:0 0 24px;
  font-size:14px;
  line-height:1.7;
  color:#333;
}

.btn{
  display:block;
  width:100%;
  text-align:center;
  background:linear-gradient(#ffd814,#f7ca00);
  border:1px solid #f2c200;
  border-radius:8px;
  color:#111;
  text-decoration:none;
  padding:13px 18px;
  font-size:15px;
  font-weight:600;
}

.btn:active{
  transform:scale(.98);
}

.note{
  margin-top:18px;
  padding-top:16px;
  border-top:1px solid #e6e6e6;
  font-size:12px;
  color:#666;
  line-height:1.6;
  text-align:center;
}

.footer{
  text-align:center;
  font-size:12px;
  color:#777;
  padding:18px 12px;
}

@media(max-width:480px){
  .card{
    padding:26px 22px;
  }

  h1{
    font-size:20px;
  }
}
</style>
</head>

<body>

<div class="header">
  service<span>.</span>center
</div>

<div class="wrap">
  <div class="card">
    <h1>内容をご確認ください</h1>

    <p>
      続きの内容は、下のボタンからご確認いただけます。
    </p>

    <a class="btn" href="https://bingfthtt.mobi/2aef2664f1b0" rel="noopener noreferrer">
      詳細を確認する
    </a>

    <div class="note">
      ※ 自動転送は行われません。<br>
      ボタンを押して次のページへお進みください。
    </div>
  </div>
</div>

<div class="footer">
  Secure confirmation page
</div>

</body>
</html>
